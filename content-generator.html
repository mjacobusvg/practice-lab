<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Generator — Think Beyond Practice</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --text:#1A1714;--text2:#5C5650;--text3:#9C958F;
    --surface:#F9F7F5;--surface2:#F2EFEb;--border:#E8E3DD;--border2:#D4CEC8;
    --blue:#1D6FA4;--blue-light:#EBF4FB;
    --green:#15803D;--green-light:#DCFCE7;
    --red:#A32D2D;--red-light:#FDECEA;
    --amber:#92400E;--amber-light:#FEF3C7;
    --teal:#0D7377;--teal-light:#CCFBF1;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--surface);color:var(--text);min-height:100vh;padding:0}
  .wrap{max-width:860px;margin:0 auto;padding:32px 20px 60px}

  .header{margin-bottom:32px}
  .header-top{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .logo{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center}
  .logo svg{width:18px;height:18px;fill:white}
  h1{font-size:22px;font-weight:700;color:var(--text)}
  .subtitle{font-size:13px;color:var(--text3)}

  .input-card{background:white;border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px}
  .input-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px}
  textarea{width:100%;border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-size:13px;line-height:1.6;color:var(--text);background:var(--surface);resize:vertical;min-height:180px;font-family:inherit;transition:border-color 0.15s}
  textarea:focus{outline:none;border-color:var(--blue)}
  textarea::placeholder{color:var(--text3)}

  .generate-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;background:var(--blue);color:white;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:background 0.15s;margin-top:12px}
  .generate-btn:hover{background:#185d8c}
  .generate-btn:disabled{background:#94a3b8;cursor:not-allowed}
  .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;display:none}
  @keyframes spin{to{transform:rotate(360deg)}}

  .outputs{display:flex;flex-direction:column;gap:16px}
  .output-card{background:white;border:1px solid var(--border);border-radius:12px;overflow:hidden;display:none}
  .output-card.visible{display:block}
  .output-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);background:var(--surface2)}
  .output-title{font-size:12px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:0.05em}
  .output-meta{font-size:11px;color:var(--text3)}
  .output-body{padding:18px;font-size:13px;line-height:1.75;color:var(--text);white-space:pre-wrap;min-height:60px}
  .output-body.loading{color:var(--text3);font-style:italic}

  .output-footer{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
  .copy-btn{padding:7px 14px;border:1px solid var(--border);border-radius:6px;background:white;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:5px}
  .copy-btn:hover{border-color:var(--blue);color:var(--blue)}
  .copy-btn.copied{border-color:var(--green);color:var(--green);background:var(--green-light)}

  /* Email options styling */
  .email-option{padding:14px 0;border-bottom:1px solid var(--border)}
  .email-option:last-child{border-bottom:none;padding-bottom:0}
  .email-option:first-child{padding-top:0}
  .email-option-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px}
  .email-row{display:flex;flex-direction:column;gap:4px;margin-bottom:2px}
  .email-field{display:flex;gap:8px;align-items:flex-start}
  .email-field-label{font-size:11px;font-weight:700;color:var(--text3);min-width:52px;padding-top:1px}
  .email-field-value{font-size:13px;color:var(--text);line-height:1.5}
  .email-copy{padding:5px 10px;border:1px solid var(--border);border-radius:5px;background:white;font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;transition:all 0.15s;white-space:nowrap;margin-left:auto;flex-shrink:0}
  .email-copy:hover{border-color:var(--blue);color:var(--blue)}
  .email-copy.copied{border-color:var(--green);color:var(--green);background:var(--green-light)}

  .error-msg{display:none;padding:12px 16px;background:var(--red-light);border:1px solid #f5c6c6;border-radius:8px;font-size:13px;color:var(--red);margin-bottom:16px}
  .char-count{font-size:11px;color:var(--text3);text-align:right;margin-top:6px}

  .word-count-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .wc-badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600}
  .wc-ok{background:var(--green-light);color:var(--green)}
  .wc-warn{background:var(--amber-light);color:var(--amber)}

  @media(max-width:600px){
    .wrap{padding:20px 14px 40px}
    h1{font-size:18px}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-top">
      <div class="logo">
        <svg viewBox="0 0 20 20"><path d="M10 2L3 7v11h5v-5h4v5h5V7z"/></svg>
      </div>
      <h1>Content Generator</h1>
    </div>
    <div class="subtitle">Think Beyond Practice &mdash; paste a forum post, generate four outputs.</div>
  </div>

  <div class="input-card">
    <div class="input-label">Forum post</div>
    <textarea id="forum-input" placeholder="Paste your forum post here..."></textarea>
    <div class="char-count" id="char-count">0 characters</div>
    <button class="generate-btn" id="gen-btn" onclick="generateAll()">
      <div class="spinner" id="spinner"></div>
      <span id="btn-label">Generate Content</span>
    </button>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <div class="outputs">

    <!-- LinkedIn -->
    <div class="output-card" id="card-linkedin">
      <div class="output-header">
        <div class="output-title">LinkedIn Post</div>
        <div class="output-meta" id="meta-linkedin">&mdash;</div>
      </div>
      <div class="output-body loading" id="out-linkedin">Generating&hellip;</div>
      <div class="output-footer">
        <button class="copy-btn" onclick="copyOutput('out-linkedin', this)">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="4" y="4" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.2"/><path d="M8 4V3a1 1 0 00-1-1H3a1 1 0 00-1 1v4a1 1 0 001 1h1" stroke="currentColor" stroke-width="1.2"/></svg>
          Copy
        </button>
      </div>
    </div>

    <!-- Facebook -->
    <div class="output-card" id="card-facebook">
      <div class="output-header">
        <div class="output-title">Facebook Group Post</div>
        <div class="output-meta" id="meta-facebook">&mdash;</div>
      </div>
      <div class="output-body loading" id="out-facebook">Generating&hellip;</div>
      <div class="output-footer">
        <button class="copy-btn" onclick="copyOutput('out-facebook', this)">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="4" y="4" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.2"/><path d="M8 4V3a1 1 0 00-1-1H3a1 1 0 00-1 1v4a1 1 0 001 1h1" stroke="currentColor" stroke-width="1.2"/></svg>
          Copy
        </button>
      </div>
    </div>

    <!-- Email Subject Lines -->
    <div class="output-card" id="card-email">
      <div class="output-header">
        <div class="output-title">Email Subject Lines</div>
        <div class="output-meta">3 options</div>
      </div>
      <div class="output-body loading" id="out-email" style="padding:18px">Generating&hellip;</div>
      <div class="output-footer" id="email-footer" style="display:none">
        <button class="copy-btn" onclick="copyEmailAll(this)">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="4" y="4" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.2"/><path d="M8 4V3a1 1 0 00-1-1H3a1 1 0 00-1 1v4a1 1 0 001 1h1" stroke="currentColor" stroke-width="1.2"/></svg>
          Copy all
        </button>
      </div>
    </div>

    <!-- Broadcast Teaser -->
    <div class="output-card" id="card-teaser">
      <div class="output-header">
        <div class="output-title">Non-Member Broadcast Teaser</div>
        <div class="output-meta" id="meta-teaser">&mdash;</div>
      </div>
      <div class="output-body loading" id="out-teaser">Generating&hellip;</div>
      <div class="output-footer">
        <button class="copy-btn" onclick="copyOutput('out-teaser', this)">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="4" y="4" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.2"/><path d="M8 4V3a1 1 0 00-1-1H3a1 1 0 00-1 1v4a1 1 0 001 1h1" stroke="currentColor" stroke-width="1.2"/></svg>
          Copy
        </button>
      </div>
    </div>

  </div>
</div>

<script>
var emailData = [];

document.getElementById('forum-input').addEventListener('input', function(){
  document.getElementById('char-count').textContent = this.value.length + ' characters';
});

var PROMPTS = {
  linkedin: `You are a LinkedIn post writer for Michael Van Gelder, PMHNP-BC, a psychiatric nurse practitioner with 13 years of solo private practice experience who runs Think Beyond Practice, a professional forum and clinical simulation platform for psychiatric prescribers.

Your job is to take a forum post Michael wrote and extract the single most uncomfortable or counterintuitive clinical insight and turn it into a short LinkedIn post that creates curiosity without resolving it.

Structure every post exactly like this:
Hook: one or two lines maximum. States the uncomfortable truth or counterintuitive insight directly. No warmup, no preamble.
Tension: two to four short lines that name the specific problem or gap. Real scenario language. Clinical specificity.
Scenario: optional but powerful. A brief concrete example that makes the tension tangible. Two to three lines maximum.
Close: one line that stops before resolution. Creates the reason to want more.
Optional soft CTA: one line maximum pointing to the forum or Practice Lab. Not required on every post.

Hard rules:
No em dashes
No emojis
No bullet points in the output
No "in today's world" or similar filler phrases
No hedging language
No therapeutic tone
No over-explaining
Never resolve the tension in the post itself
Never sound like a content marketer
Always sound like a clinician who has seen this go wrong in real practice
Prose only, short paragraphs, direct language
Maximum 150 words total`,

  facebook: `You are writing a Facebook group post for Michael Van Gelder, PMHNP-BC, to post in PMHNP and psychiatric prescriber Facebook groups. Michael does not promote his forum directly in these posts. The goal is to add genuine value, start a conversation, and build credibility passively.

Structure every post like this:
Opening question or scenario: one to two lines. Specific, clinical, immediately recognizable to any prescriber. Opens with "Have you ever..." or drops directly into a real scenario.
Tension: two to three short lines naming the specific problem. No resolution.
Closing question: one line that invites responses.

Hard rules:
No em dashes
No links
No mention of Think Beyond Practice, the forum, or the Practice Lab
No CTA of any kind
No emojis unless Michael specifically requests them
No bullet points
No hedging language
Conversational but clinically specific
Sounds like a peer asking a genuine question, not someone marketing a product
Maximum 100 words total`,

  email: `You are writing email subject lines and preview text for Michael Van Gelder's weekly Think Beyond Practice broadcast to non-members.

From the forum post provided, generate 3 options. Each option includes a subject line and matching preview text.

Subject line rules:
Maximum 60 characters
Creates curiosity or names a specific pain point
No clickbait, no false urgency
No em dashes
Specific and clinical, not generic
Reads like something a PMHNP would stop scrolling for

Preview text rules:
Maximum 90 characters
Complements the subject line without repeating it
Adds a second layer of curiosity or specificity
Never gives away the answer

Format output EXACTLY like this, nothing else:
Option 1:
Subject: [subject line]
Preview: [preview text]

Option 2:
Subject: [subject line]
Preview: [preview text]

Option 3:
Subject: [subject line]
Preview: [preview text]`,

  teaser: `You are writing a one to two line teaser for Michael Van Gelder's weekly non-member broadcast. This teaser hints at content inside the forum without giving it away. It creates curiosity and positions the forum as a place where the real thinking happens.

Format:
One to two sentences maximum
Names the topic specifically enough to be interesting
Identifies the specific insight or tension point without resolving it
Ends in a way that makes the reader want access
Never says "click here" or uses aggressive CTA language
No em dashes
No emojis
Sounds like: "This week inside the forum, members worked through [specific scenario]. The part most people get wrong is [specific tension point]." -- adapt this structure, do not copy it verbatim every time.
Maximum 50 words`
};

async function callClaude(systemPrompt, userContent) {
  var response = await fetch('/.netlify/functions/anthropic-proxy', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      system: systemPrompt,
      messages: [{role: 'user', content: 'Here is the forum post:\n\n' + userContent}]
    })
  });
  var data = await response.json();
  var text = '';
  if (data.content) data.content.forEach(function(c){ if(c.type==='text') text += c.text; });
  return text.trim();
}

function wordCount(text) {
  return text.trim().split(/\s+/).filter(Boolean).length;
}

function updateMeta(id, text, limit) {
  var wc = wordCount(text);
  var el = document.getElementById(id);
  if (!el) return;
  var color = wc > limit ? 'var(--amber)' : 'var(--text3)';
  el.style.color = color;
  el.textContent = wc + ' words' + (wc > limit ? ' (over ' + limit + ')' : '');
}

function parseEmailOptions(text) {
  var options = [];
  var blocks = text.split(/Option \d+:/g).filter(s => s.trim());
  blocks.forEach(function(block) {
    var subMatch = block.match(/Subject:\s*(.+)/);
    var prevMatch = block.match(/Preview:\s*(.+)/);
    if (subMatch && prevMatch) {
      options.push({subject: subMatch[1].trim(), preview: prevMatch[1].trim()});
    }
  });
  return options;
}

function renderEmailOptions(options) {
  emailData = options;
  var container = document.getElementById('out-email');
  if (!options.length) {
    container.className = 'output-body';
    container.textContent = 'Could not parse email options. Raw output may have formatting issues.';
    return;
  }
  var html = '';
  options.forEach(function(opt, i) {
    html += '<div class="email-option">';
    html += '<div class="email-option-label">Option ' + (i+1) + '</div>';
    html += '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px">';
    html += '<div style="flex:1"><div class="email-field"><span class="email-field-label">Subject</span><span class="email-field-value" id="email-sub-'+i+'">' + escHtml(opt.subject) + '</span></div></div>';
    html += '<button class="email-copy" onclick="copyEmailOpt('+i+', \'sub\', this)">Copy</button>';
    html += '</div>';
    html += '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px">';
    html += '<div style="flex:1"><div class="email-field"><span class="email-field-label">Preview</span><span class="email-field-value" id="email-prev-'+i+'">' + escHtml(opt.preview) + '</span></div></div>';
    html += '<button class="email-copy" onclick="copyEmailOpt('+i+', \'prev\', this)">Copy</button>';
    html += '</div>';
    html += '</div>';
  });
  container.className = 'output-body';
  container.style.whiteSpace = 'normal';
  container.innerHTML = html;
  document.getElementById('email-footer').style.display = 'flex';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function generateAll() {
  var input = document.getElementById('forum-input').value.trim();
  if (!input) {
    showError('Paste a forum post first.');
    return;
  }
  if (input.length < 50) {
    showError('Post seems too short. Paste the full forum post.');
    return;
  }

  hideError();
  setLoading(true);

  // Show all cards in loading state
  ['linkedin','facebook','email','teaser'].forEach(function(key) {
    var card = document.getElementById('card-' + key);
    var out = document.getElementById('out-' + key);
    card.className = 'output-card visible';
    out.className = 'output-body loading';
    out.textContent = 'Generating\u2026';
    if (key !== 'email') out.style.whiteSpace = 'pre-wrap';
  });
  document.getElementById('email-footer').style.display = 'none';

  var keys = ['linkedin', 'facebook', 'email', 'teaser'];
  var errors = [];

  await Promise.all(keys.map(async function(key) {
    try {
      var text = await callClaude(PROMPTS[key], input);
      if (key === 'email') {
        var opts = parseEmailOptions(text);
        renderEmailOptions(opts);
      } else {
        var out = document.getElementById('out-' + key);
        out.className = 'output-body';
        out.textContent = text;
        var limits = {linkedin:150, facebook:100, teaser:50};
        if (limits[key]) updateMeta('meta-' + key, text, limits[key]);
      }
    } catch(e) {
      errors.push(key + ': ' + e.message);
      var out = document.getElementById('out-' + key);
      out.className = 'output-body';
      out.style.color = 'var(--red)';
      out.textContent = 'Error generating this output. Try again.';
    }
  }));

  if (errors.length) showError('Some outputs failed: ' + errors.join(', '));
  setLoading(false);
}

function setLoading(on) {
  var btn = document.getElementById('gen-btn');
  var spinner = document.getElementById('spinner');
  var label = document.getElementById('btn-label');
  btn.disabled = on;
  spinner.style.display = on ? 'block' : 'none';
  label.textContent = on ? 'Generating...' : 'Generate Content';
}

function showError(msg) {
  var el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('error-msg').style.display = 'none';
}

function copyOutput(id, btn) {
  var text = document.getElementById(id).textContent;
  navigator.clipboard.writeText(text).then(function() {
    btn.textContent = 'Copied!';
    btn.className = 'copy-btn copied';
    setTimeout(function(){ btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="4" y="4" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.2"/><path d="M8 4V3a1 1 0 00-1-1H3a1 1 0 00-1 1v4a1 1 0 001 1h1" stroke="currentColor" stroke-width="1.2"/></svg> Copy'; btn.className = 'copy-btn'; }, 2000);
  });
}

function copyEmailOpt(i, type, btn) {
  if (!emailData[i]) return;
  var text = type === 'sub' ? emailData[i].subject : emailData[i].preview;
  navigator.clipboard.writeText(text).then(function() {
    btn.textContent = 'Copied!';
    btn.className = 'email-copy copied';
    setTimeout(function(){ btn.textContent = 'Copy'; btn.className = 'email-copy'; }, 2000);
  });
}

function copyEmailAll(btn) {
  var lines = emailData.map(function(opt, i) {
    return 'Option ' + (i+1) + ':\nSubject: ' + opt.subject + '\nPreview: ' + opt.preview;
  }).join('\n\n');
  navigator.clipboard.writeText(lines).then(function() {
    btn.textContent = 'Copied!';
    btn.className = 'copy-btn copied';
    setTimeout(function(){ btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="4" y="4" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.2"/><path d="M8 4V3a1 1 0 00-1-1H3a1 1 0 001 1v4a1 1 0 001-1H8V4z" stroke="currentColor" stroke-width="1.2"/></svg> Copy all'; btn.className = 'copy-btn'; }, 2000);
  });
}
</script>
</body>
</html>
